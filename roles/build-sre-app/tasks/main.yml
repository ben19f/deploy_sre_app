
- name: Copy application files
  copy:
    src: /tmp/sre-app          
    dest: /opt/
    remote_src: yes   
    
- name: Deploy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: /opt/sre-app/docker-compose.yml

- name: Start application
  community.docker.docker_compose_v2:
    project_src: /opt/sre-app
    state: present