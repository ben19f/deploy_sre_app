postgres_db: sre
postgres_user: sre
postgres_password: sre



# доли от RAM
ram_os_reserve: 0.2
ram_postgres: 0.35
ram_php: 0.30
ram_buffer: 0.15


# PostgreSQL tuning (RAM-based)
pg_shared_buffers: "{{ (ansible_memtotal_mb * 0.25) | int }}MB"
pg_effective_cache_size: "{{ (ansible_memtotal_mb * 0.75) | int }}MB"
pg_work_mem: "16MB"
pg_maintenance_work_mem: "64MB"
pg_max_connections: 5